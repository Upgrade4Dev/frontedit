<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Define a codificação de caracteres padrão para evitar problemas com acentos e símbolos -->
    <meta charset="UTF-8">
    <!-- Garante o correto dimensionamento e responsividade do editor em qualquer tamanho de tela -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade4Dev</title>
    
    <!-- Importa a biblioteca de estilos do Bootstrap para componentes e botões modernos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- ESTILO DO PRISM.JS (Tema Dark semelhante ao VS Code) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    
    <!-- Importa o arquivo de estilos customizados do nosso editor (camada View) -->
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<div class="app-container">
    <!-- BARRA DE FERRAMENTAS SUPERIOR (NAVBAR) -->
    <div class="navbar-custom d-flex justify-content-between align-items-center">
        <!-- Identificação do sistema em arquitetura baseada em MVC -->
        <h5 class="m-0 fw-bold text-info">🚀 Upgrade4Dev</h5>
        <div>
            <!-- Aciona a função do Controller para carregar a estrutura textual limpa no modal -->
            <button class="btn btn-sm btn-outline-info me-2" onclick="AppController.showFullCodeModal()">📄 Ver Código Estruturado</button>
            <!-- Comanda o Controller para compilar os códigos atuais e baixar como arquivo HTML -->
            <button class="btn btn-sm btn-outline-light me-2" onclick="AppController.saveToDisk()">💾 Salvar Local</button>
            <!-- Atualiza manualmente o conteúdo exibido dentro da janela de testes (Preview) -->
            <button class="btn btn-sm btn-success" onclick="AppController.renderPreview()">Atualizar Preview</button>
            <!-- BOTÃO RESET: Limpa o banco de dados local do navegador e restaura o editor para o padrão de fábrica -->
            <button class="btn btn-danger btn-sm px-3 ms-2" onclick="AppController.resetEditor()">Reset</button>
        </div>
    </div>

    <!-- ÁREA PRINCIPAL DO EDITOR (COM DIVISÓRIA AJUSTÁVEL) -->
    <div class="main-content" id="main-content-container">
        
        <!-- LADO ESQUERDO: Abas Selecionáveis e Caixas de Código -->
        <div id="painel-esquerdo" class="editor-side border-end border-secondary d-flex flex-column" style="width: 50%;">
            <!-- Listagem de abas estruturadas com componentes de abas do Bootstrap -->
            <ul class="nav nav-tabs bg-dark border-0">
                <li class="nav-item"><a class="nav-link active" id="tab-html" onclick="AppController.changeTab('html')">HTML</a></li>
                <li class="nav-item"><a class="nav-link" id="tab-css" onclick="AppController.changeTab('css')">CSS</a></li>
                <li class="nav-item"><a class="nav-link" id="tab-js" onclick="AppController.changeTab('js')">JS</a></li>
                <li class="nav-item"><a class="nav-link" id="tab-ajax" onclick="AppController.changeTab('ajax')">AJAX</a></li>
            </ul>
            

            <!-- CAIXA MÃE DO EDITOR: Guarda os editores e as barras de numeração de linha -->
            <div class="editor-content-box flex-grow-1">
                
                <!-- ABA HTML (Com numeração e campo de texto) -->
                <div id="wrapper-html" class="editor-wrapper">
                    <div id="linhas-html" class="line-numbers-sidebar">1</div>
                    <textarea id="editor-html" class="code-textarea" spellcheck="false" oninput="AppController.handleCodeInput('html', this.value)"></textarea>
                </div>
                
                <!-- ABA CSS (Com numeração e campo de texto - Escondida inicialmente) -->
                <div id="wrapper-css" class="editor-wrapper d-none">
                    <div id="linhas-css" class="line-numbers-sidebar">1</div>
                    <textarea id="editor-css" class="code-textarea" spellcheck="false" oninput="AppController.handleCodeInput('css', this.value)"></textarea>
                </div>
                
                <!-- ABA JS (Com numeração e campo de texto - Escondida inicialmente) -->
                <div id="wrapper-js" class="editor-wrapper d-none">
                    <div id="linhas-js" class="line-numbers-sidebar">1</div>
                    <textarea id="editor-js" class="code-textarea" spellcheck="false" oninput="AppController.handleCodeInput('js', this.value)"></textarea>
                </div>
                
                <!-- ABA AJAX (Com numeração e campo de texto - Escondida inicialmente) -->
                <div id="wrapper-ajax" class="editor-wrapper d-none">
                    <div id="linhas-ajax" class="line-numbers-sidebar">1</div>
                    <textarea id="editor-ajax" class="code-textarea" spellcheck="false" oninput="AppController.handleCodeInput('ajax', this.value)"></textarea>
                </div>

            </div>            



        </div>

        <!-- BARRA SEPARADORA CENTRAL ARRASTÁVEL -->
        <div id="divisor-central" class="resizer-bar"></div>

        <!-- LADO DIREITO: Janela de Preview em Tempo Real -->
        <div id="painel-direito" class="preview-side flex-grow-1">
            <iframe id="preview-janela" class="preview-iframe"></iframe>
        </div>
        
    </div>
</div>


<!-- MODAL VISUALIZADOR DA ANATOMIA DO CÓDIGO MONTADO -->
<div class="modal fade" id="codigoCompletoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content bg-dark text-light border-secondary">
      
      <!-- Cabeçalho contendo o título e o botão tradicional de fechar (X) -->
      <div class="modal-header border-secondary">
        <h5 class="modal-title text-info">Estrutura completa do seu código</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
            
      <!-- Corpo onde o código completo será renderizado -->
      <div class="modal-body p-3" id="codigo-completo-render" style="font-family: 'Consolas', monospace; font-size: 14px; white-space: pre; overflow: auto; background-color: #121212;">
      </div>
            
      <!-- Rodapé do modal contendo uma ação clara de saída -->
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Fechar Janela</button>
      </div>

    </div>
  </div>
</div>

<!-- SCRIPT COMPLEMENTAR DO BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- CARREGAMENTO DOS SCRIPTS LOCAIS SEGUINDO A ARQUITETURA MVC -->
<script src="js/model.js"></script>
<script src="js/view.js"></script>
<script src="js/controller.js"></script>

</body>
</html>
